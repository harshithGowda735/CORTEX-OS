# yaml-language-server: $schema=https://render.com/schema/render.yaml.json
services:
  - type: web
    name: cortex-agri-health-mcp-backend
    env: node
    plan: free
    buildCommand: npm install
    startCommand: node index.js
    rootDir: server
    envVars:
      - key: PORT
        value: 5000
      - key: NODE_VERSION
        value: 20.0.0
      - key: MONGODB_URI
        value: "" # Set in Render Dashboard
        sync: false
      - key: JWT_SECRET
        value: "" # Set in Render Dashboard
        sync: false
      - key: RESEND_API_KEY
        value: "" # Set in Render Dashboard
        sync: false
      - key: FRONTEND_URL
        value: "https://cortex-os-blond.vercel.app"
      - key: BACKEND_URL
        value: "https://cortex-os-9.onrender.com"
      - key: GEMINI_API_KEY
        value: "" # Set in Render Dashboard
        sync: false
      - key: GOOGLE_MAPS_API_KEY
        value: "" # Set in Render Dashboard
        sync: false
      - key: OPENAI_API_KEY
        value: "" # Set in Render Dashboard
        sync: false