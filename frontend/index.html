<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>frontend</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
    <script type="text/javascript">
      function googleTranslateElementInit() {
        new google.translate.TranslateElement({
          pageLanguage: 'en',
          includedLanguages: 'hi,kn,te,ta,ml,gu,pa,bn,mr', 
          layout: google.translate.TranslateElement.InlineLayout.SIMPLE,
          autoDisplay: false
        }, 'google_translate_element');
      }
    </script>
    <style>
      /* Hide the Google Translate Top Banner */
      .goog-te-banner-frame.skiptranslate, .goog-te-gadget-icon { display: none !important; }
      body { top: 0px !important; }
      .goog-te-gadget-simple {
        background-color: transparent !important;
        border: 1px solid rgba(16, 185, 129, 0.2) !important;
        padding: 4px 8px !important;
        border-radius: 12px !important;
        font-family: inherit !important;
        color: #10b981 !important;
      }
      .goog-te-menu-value span { color: #10b981 !important; font-size: 9px !important; font-weight: 900 !important; text-transform: uppercase !important; }
      .goog-te-gadget-simple img { display: none !important; }
      .VIpgJd-Zvi9nc-OTti-AFn3C-fh7W7-Bc-Xv-By-Bz { display: none !important; }
    </style>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
